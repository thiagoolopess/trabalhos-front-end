<!DOCTYPE html>
<html>
<head>
    <title>Validador de CPF</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .caixa {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .texto {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3578c9;
        }

        #mensagem {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .certo {
            color: green;
        }

        .errado {
            color: red;
        }

    </style>
</head>

<body>

    <div class="caixa">

        <h1>Validador de CPF</h1>

        <p class="texto">Digite um CPF para verificar se ele é válido ou inválido.</p>

        <input type="text" id="numeroCpf" placeholder="Digite o CPF">

        <button onclick="conferirCPF()"> Validar</button>

        <div id="mensagem"></div>

    </div>

    <script>

        function conferirCPF() {

            let numeroCpf = document.getElementById("numeroCpf").value;

            numeroCpf = numeroCpf.replace(/\D/g, "");

            let mensagem = document.getElementById("mensagem");

            if (numeroCpf.length != 11) {
                mensagem.innerHTML = "CPF Inválido";
                mensagem.className = "errado";
                return;
            }

            let total = 0;
            let digito;

            for (let contador = 0; contador < 9; contador++) {
                total += parseInt(numeroCpf.charAt(contador)) * (10 - contador);
            }

            digito = (total * 10) % 11;

            if (digito == 10) {
                digito = 0;
            }

            if (digito != parseInt(numeroCpf.charAt(9))) {
                mensagem.innerHTML = "CPF Inválido";
                mensagem.className = "errado";
                return;
            }

            total = 0;

    
            for (let contador = 0; contador < 10; contador++) {
                total += parseInt(numeroCpf.charAt(contador)) * (11 - contador);
            }

            digito = (total * 10) % 11;

            if (digito == 10) {
                digito = 0;
            }

            if (digito != parseInt(numeroCpf.charAt(10))) {
                mensagem.innerHTML = "CPF Inválido";
                mensagem.className = "errado";
                return;
            }

            mensagem.innerHTML = "CPF Válido";
            mensagem.className = "certo";
        }

    </script>

</body>
</html>
